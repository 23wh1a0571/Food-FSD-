<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - Food Recipe Finder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/jwt-decode@3.1.2/build/jwt-decode.min.js"></script>
  <style>
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        45deg,
        rgba(59, 130, 246, 0.05),
        rgba(59, 130, 246, 0.05) 10px,
        rgba(14, 165, 233, 0.05) 10px,
        rgba(14, 165, 233, 0.05) 20px
      );
      pointer-events: none;
      z-index: -1;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-sky-50 via-cyan-50 to-sky-100 text-slate-900 flex items-center justify-center min-h-screen">

  <div class="bg-white shadow-xl rounded-2xl p-8 max-w-md w-full border border-cyan-100">
    <h2 class="text-3xl font-extrabold text-center text-cyan-700 mb-6">📝 Create an Account</h2>

    <!-- Google Register -->
    <div class="mb-6 text-center">
      <div id="g_id_onload"
        data-client_id="YOUR_GOOGLE_CLIENT_ID"
        data-callback="handleCredentialResponse">
      </div>
      <div class="g_id_signin"
        data-type="standard"
        data-size="large"
        data-theme="outline"
        data-text="sign_up_with"
        data-shape="pill"
        data-logo_alignment="left">
      </div>
      <p class="mt-2 text-sm text-slate-500">or register with your email below</p>
    </div>

    <!-- Email Registration Form -->
    <form id="registerForm" class="space-y-4">
      <div>
        <label for="name" class="block text-slate-700 font-semibold mb-1">Full Name</label>
        <input type="text" id="name" name="name" required class="w-full px-4 py-2 border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-cyan-400" />
      </div>
      <div>
        <label for="email" class="block text-slate-700 font-semibold mb-1">Email</label>
        <input type="email" id="email" name="email" required class="w-full px-4 py-2 border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-cyan-400" />
      </div>
      <div>
        <label for="password" class="block text-slate-700 font-semibold mb-1">Password</label>
        <input type="password" id="password" name="password" required class="w-full px-4 py-2 border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-cyan-400" />
      </div>
      <div>
        <label for="confirm_password" class="block text-slate-700 font-semibold mb-1">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" required class="w-full px-4 py-2 border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-cyan-400" />
        <p id="registerError" class="mt-1 text-sm text-red-600 font-semibold"></p>

    </div>
      <button type="submit" class="w-full bg-cyan-600 text-white font-semibold py-2 rounded hover:bg-cyan-700 transition">Register</button>
    </form>
    
    <p class="mt-4 text-center text-sm text-slate-600">
      Already have an account?
      <a href="login.html" class="text-cyan-600 hover:underline">Login here</a>.
    </p>
  </div>

  <!-- Google Login Callback -->
  <script>
    document.getElementById("registerForm").addEventListener("submit", function (e) {
  e.preventDefault();

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirm_password").value;
  const errorMsg = document.getElementById("registerError");

  errorMsg.textContent = "";  // Clear previous error

  if (password !== confirmPassword) {
    errorMsg.textContent = "Passwords do not match!";
    return;
  }

  // Save user info to localStorage (for demo purpose only; not secure for real use)
  const user = { name, email, password };
  localStorage.setItem("userData", JSON.stringify(user));
  localStorage.setItem("isLoggedIn", "true");
  localStorage.setItem("userEmail", email);

  alert("Registered successfully!");
  window.location.href = "index.html";
});

  </script>
</body>
</html>
