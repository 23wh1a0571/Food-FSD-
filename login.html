<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Food Recipe Finder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/jwt-decode@3.1.2/build/jwt-decode.min.js"></script>
  <style>
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        45deg,
        rgba(59, 130, 246, 0.05),
        rgba(59, 130, 246, 0.05) 10px,
        rgba(14, 165, 233, 0.05) 10px,
        rgba(14, 165, 233, 0.05) 20px
      );
      pointer-events: none;
      z-index: -1;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-sky-50 via-cyan-50 to-sky-100 min-h-screen flex items-center justify-center px-4 text-slate-900">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">
    <h1 class="text-3xl font-extrabold text-cyan-600 text-center mb-6">🔐 Login to Your Account</h1>

    <!-- Google Login -->
    <div class="mb-6">
      <div id="g_id_onload"
        data-client_id="YOUR_GOOGLE_CLIENT_ID"
        data-callback="handleCredentialResponse">
      </div>
      <div class="g_id_signin"
        data-type="standard"
        data-size="large"
        data-theme="outline"
        data-text="sign_in_with"
        data-shape="pill"
        data-logo_alignment="left">
      </div>
      <p class="text-center text-sm text-gray-500 mt-3">or sign in with email below</p>
    </div>

    <!-- Email Login Form -->
    <form id="loginForm" class="space-y-5">
      <div>

       
        <label for="email" class="block text-sm font-semibold text-gray-700">Email</label>
        <input type="email" id="email" name="email" required
          class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-400 focus:outline-none" />
      </div>
      <div>
        <label for="password" class="block text-sm font-semibold text-gray-700">Password</label>
        <input type="password" id="password" name="password" required
          class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-400 focus:outline-none" />
      </div>
      <button type="submit"
        class="w-full bg-cyan-600 text-white font-semibold py-2 rounded-lg hover:bg-cyan-700 transition">Login</button>
    </form>

    <p id="errorMsg" class="mt-2 text-center text-sm text-red-600 font-semibold"></p>


    <p class="mt-6 text-center text-sm text-gray-600">
      Don't have an account?
      <a href="register.html" class="text-cyan-600 hover:underline font-medium">Register here</a>.
    </p>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function (e) {
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errorMsg = document.getElementById("errorMsg");

  // Clear previous error message
  errorMsg.textContent = "";

  // Hardcoded valid users for demo
  const validUsers = [
    { email: "user@example.com", password: "password123" },
    { email: "admin@example.com", password: "adminpass" }
  ];

  const storedData = JSON.parse(localStorage.getItem("userData"));

  const isValidStoredUser = storedData && storedData.email === email && storedData.password === password;
  const isValidHardcodedUser = validUsers.some(user => user.email === email && user.password === password);

  if (!isValidStoredUser && !isValidHardcodedUser) {
    errorMsg.textContent = "Invalid email or password.";
    return;
  }

  alert("Login successful!");
  localStorage.setItem("isLoggedIn", "true");
  localStorage.setItem("userEmail", email);
  window.location.href = "index.html";
});

  </script>
</body>
</html>
