<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logout - Food Recipe Finder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Clear local storage on page load
    localStorage.removeItem("isLoggedIn");
    localStorage.removeItem("userEmail");
  </script>
  <meta http-equiv="refresh" content="3; url=login.html" />
  <style>
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        45deg,
        rgba(59, 130, 246, 0.05),
        rgba(59, 130, 246, 0.05) 10px,
        rgba(14, 165, 233, 0.05) 10px,
        rgba(14, 165, 233, 0.05) 20px
      );
      pointer-events: none;
      z-index: -1;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-sky-50 via-cyan-50 to-sky-100 text-slate-900 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 text-center border border-cyan-100">
    <h2 class="text-3xl font-extrabold text-cyan-600 mb-4">👋 You've been logged out</h2>
    <p class="text-gray-600 text-sm mb-6">Redirecting to the login page...</p>
    
    <!-- Spinner -->
    <div class="flex justify-center mb-6">
      <svg class="animate-spin h-6 w-6 text-cyan-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
      </svg>
    </div>

    <a href="login.html" class="inline-block bg-cyan-600 text-white px-6 py-2 rounded-lg hover:bg-cyan-700 transition">
      Go to Login
    </a>
  </div>

</body>
</html>
